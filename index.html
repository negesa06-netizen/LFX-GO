<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founders Section</title>
</head>
<body>
    <h1>Founders</h1>
    <div class="founder">
        <img src="path_to_avatar_lewis.jpg" alt="Lewis Mwirigi's Avatar">
        <h2>Lewis Mwirigi</h2>
        <p>Role: Co-founder</p>
        <p>Contact: lewis@example.com</p>
        <button onclick="editAvatar('path_to_avatar_lewis.jpg')">Edit Avatar</button>
    </div>
    <div class="founder">
        <img src="path_to_avatar_newton.jpg" alt="Newton Egesa's Avatar">
        <h2>Newton Egesa</h2>
        <p>Role: Co-founder</p>
        <p>Contact: newton@example.com</p>
        <button onclick="editAvatar('path_to_avatar_newton.jpg')">Edit Avatar</button>
    </div>

    <script>
        function editAvatar(imagePath) {
            // Logic to edit avatar
            const newImagePath = prompt("Enter new avatar URL:", imagePath);
            if (newImagePath) {
                // Update the image source
                const image = document.querySelector(`img[src='${imagePath}']`);
                image.src = newImagePath;
            }
        }
    </script>
</body>
</html>
